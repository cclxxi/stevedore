name: Publish (crates.io)

# Publishes the crate to crates.io when a version tag is pushed. Runs alongside
# the cargo-dist release.yml (binaries + Homebrew) on the same tag, but is kept
# separate so regenerating the cargo-dist workflow never clobbers it.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

# Never run two publishes for the same tag at once, and never cancel one midway.
concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match Cargo.toml version '$crate'"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
